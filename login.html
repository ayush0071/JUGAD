<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — JUGAD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="assets/favicon.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="navbar"></div>

<main class="page container">
  <form id="login-form" class="card form-card fade-up">
    <h1 class="mb-1" style="font-size:24px;">Welcome back</h1>
    <p class="text-dim mb-3">Log in to download and manage your software.</p>

    <div class="field">
      <label for="email">Email</label>
      <input required type="email" id="email" class="input" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input required type="password" id="password" class="input" />
    </div>
    <p class="text-right mb-2" style="text-align:right; margin-top:-10px;">
      <a href="forgot-password.html" style="font-size:12px; color:var(--accent);">Forgot password?</a>
    </p>

    <button class="btn btn-primary btn-block" type="submit" id="submit-btn">Log in</button>

    <p class="text-center text-dim mt-3" style="font-size:14px;">
      New here? <a href="register.html" style="color:var(--accent-light);">Create an account</a>
    </p>
    <p class="text-center text-faint mt-1" style="font-size:12px;">
      Are you an admin? <a href="admin/login.html" style="color:var(--text-faint);">Go to admin login</a>
    </p>
  </form>
</main>

<div id="footer"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/notifications.js"></script>
<script src="js/nav.js"></script>
<script src="js/pages/login.js"></script>
</body>
</html>
