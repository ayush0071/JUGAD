<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Developers — JUGAD Admin</title>
<link rel="icon" href="../assets/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="admin-shell">
  <div id="admin-sidebar"></div>
  <main class="admin-main">
    <h1 class="mb-3">Developers</h1>
    <p class="text-dim mb-3" style="font-size:14px;">These show up in the "Meet the developers" section on the homepage.</p>

    <form id="developer-form" class="card mb-4" style="max-width:480px;">
      <div class="field">
        <label for="dev-name">Name</label>
        <input required id="dev-name" class="input" />
      </div>
      <div class="field">
        <label for="dev-bio">Short bio</label>
        <input id="dev-bio" class="input" placeholder="e.g. Full-stack developer, coffee enthusiast" />
      </div>
      <div class="field">
        <label for="dev-photo">Photo</label>
        <input type="file" id="dev-photo" accept="image/*" class="input" style="padding:8px;" />
        <div id="dev-preview-wrap" style="display:none; margin-top:10px;">
          <img id="dev-preview" style="width:70px; height:70px; border-radius:50%; object-fit:cover; border:1px solid var(--border);" />
        </div>
      </div>
      <button class="btn btn-primary btn-sm" type="submit">+ Add developer</button>
    </form>

    <div id="developers-list"></div>
  </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/pages/admin/admin-nav.js"></script>
<script src="../js/pages/admin/admin-developers.js"></script>
</body>
</html>
