<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset your password — JUGAD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="assets/favicon.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="navbar"></div>

<main class="page container">
  <div class="card form-card fade-up" id="reset-card">
    <div id="step-request">
      <h1 class="mb-1" style="font-size:22px;">Reset your password</h1>
      <p class="text-dim mb-3" style="font-size:13px;">Enter the email on your account (admin or user) and we'll send a 6-digit code.</p>
      <div class="field">
        <label for="reset-email">Email</label>
        <input required type="email" id="reset-email" class="input" />
      </div>
      <button class="btn btn-primary btn-block" id="request-otp-btn">Send code</button>
    </div>

    <div id="step-verify" style="display:none;">
      <h1 class="mb-1" style="font-size:22px;">Enter your code</h1>
      <p class="text-dim mb-3" style="font-size:13px;" id="verify-subtext"></p>
      <div id="otp-fallback-note" style="display:none;"></div>
      <div class="field">
        <label for="otp-code">6-digit code</label>
        <input required id="otp-code" class="input" maxlength="6" inputmode="numeric" />
      </div>
      <div class="field">
        <label for="new-password">New password</label>
        <input required type="password" id="new-password" minlength="8" class="input" />
      </div>
      <button class="btn btn-primary btn-block" id="reset-password-btn">Reset password</button>
      <button class="link-btn mt-2" id="resend-otp-btn">Resend code</button>
    </div>
  </div>
</main>

<div id="footer"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/notifications.js"></script>
<script src="js/nav.js"></script>
<script src="js/pages/forgot-password.js"></script>
</body>
</html>
