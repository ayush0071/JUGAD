<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create account — JUGAD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="assets/favicon.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="navbar"></div>

<main class="page container">
  <form id="register-form" class="card form-card fade-up">
    <h1 class="mb-1" style="font-size:24px;">Create your account</h1>
    <p class="text-dim mb-3">Join JUGAD to explore and download software.</p>

    <div class="field">
      <label for="name">Full name</label>
      <input required id="name" class="input" />
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input required type="email" id="email" class="input" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input required type="password" id="password" minlength="8" class="input" />
      <p class="hint">At least 8 characters.</p>
    </div>

    <button class="btn btn-primary btn-block" type="submit" id="submit-btn">Create account</button>

    <p class="text-center text-dim mt-3" style="font-size:14px;">
      Already have an account? <a href="login.html" style="color:var(--accent-light);">Log in</a>
    </p>
  </form>
</main>

<div id="footer"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/notifications.js"></script>
<script src="js/nav.js"></script>
<script src="js/pages/register.js"></script>
</body>
</html>
